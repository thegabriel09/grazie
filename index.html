<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grazie</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #111827, #1f2937);
            font-family: Arial, Helvetica, sans-serif;
            color: white;
            text-align: center;
            padding: 20px;
        }

        .container {
            max-width: 800px;
        }

        img {
            width: 300px;
            max-width: 90%;
            border-radius: 15px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,.4);
        }

        h1 {
            font-size: 3.5rem;
            margin-bottom: 15px;
        }

        p {
            font-size: 1.5rem;
            color: #d1d5db;
        }

        .heart {
            color: #ff4d6d;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%,100% { transform: scale(1); }
            50% { transform: scale(1.15); }
        }

        .announce-btn {
            display: inline-block;
            margin-top: 30px;
            padding: 12px 30px;
            background: #ff4d6d;
            color: white;
            text-decoration: none;
            border-radius: 30px;
            font-weight: bold;
            font-size: 1rem;
            transition: transform .2s, box-shadow .2s;
            box-shadow: 0 6px 18px rgba(255,77,109,.4);
        }

        .announce-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 24px rgba(255,77,109,.5);
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="https://old.solarismc.online/abyss-logo.png" alt="img">

        <h1>Grazie di tutto <span class="heart">❤️</span></h1>

        <a href="annuncio.html" class="announce-btn">Leggi di più →</a>
    </div>
</body>
</html>
